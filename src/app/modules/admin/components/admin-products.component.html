<div class="products-page">
  <h2 class="page-title">Manage Products</h2>

  <div class="row">
    <div class="col-lg-4">
      <div class="card">
        <div class="card-header">
          <h5 class="card-title">Add Product</h5>
        </div>
        <div class="card-body">
          <form [formGroup]="productForm" (ngSubmit)="onCreateProduct()">
            <div class="form-group mb-3">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" formControlName="name" placeholder="Product name">
            </div>

            <div class="form-group mb-3">
              <label class="form-label">SKU</label>
              <input type="text" class="form-control" formControlName="sku" placeholder="e.g., SKU-001">
            </div>

            <div class="form-group mb-3">
              <label class="form-label">Price ($)</label>
              <input type="number" class="form-control" formControlName="price" placeholder="0.00" step="0.01">
            </div>

            <div class="form-group mb-3">
              <label class="form-label">Category</label>
              <select class="form-control" formControlName="categoryId">
                <option value="">Select Category</option>
                <option *ngFor="let cat of categories" [value]="cat.categoryId">
                  {{ cat.categoryName }}
                </option>
              </select>
            </div>

            <div class="form-group mb-3">
              <label class="form-label">Image URL (optional)</label>
              <input type="text" class="form-control" formControlName="imageUrl" placeholder="https://...">
            </div>

            <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
            <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="productForm.invalid || loading">
              {{ loading ? 'Adding...' : 'Add Product' }}
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card">
        <div class="card-header">
          <h5 class="card-title">Products</h5>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>SKU</th>
                  <th>Price</th>
                  <th>Category</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let product of products">
                  <td>{{ product.name }}</td>
                  <td>{{ product.sku }}</td>
                  <td>₹{{ product.price | number: '1.2-2' }}</td>
                  <td>{{ product.categoryName }}</td>
                  <td>
                    <button class="btn btn-sm btn-danger" (click)="onDeleteProduct(product.productId)">
                      Delete
                    </button>
                  </td>
                </tr>
                <tr *ngIf="products.length === 0">
                  <td colspan="5" class="text-center text-muted py-4">No products found</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
